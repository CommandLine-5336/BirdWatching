<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BirdWatching</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #fafafa; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; max-width: 450px; }
        img { width: 100%; max-width: 400px; border-radius: 6px; height: 300px; object-fit: cover; }
        .footer { margin-top: 20px; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="card">
    <img src="{{ bird.url }}" alt="Bird">
    
    <h3>{{ bird.description }}</h3>
    
    <p><strong>Location:</strong> {{ bird.location }}</p>
    
    <div class="footer">
        <p>Generated by web server: <strong>{{ hostname }}</strong></p>
    </div>
</div>

</body>
</html>
