<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bird Feed</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body onclick="if(event.target.tagName !== 'A' && event.target.tagName !== 'BUTTON' && !event.target.closest('.upload-content')) nextBird()">
    <a href="/logout" class="logout-btn">Logout ({{ username }})</a>
    <div id="feed">
        <div class="post">
            {% if birds_data and birds_data[0].img %}
                <img id="bird-img" class="post-img" src="{{ birds_data[0].img }}" alt="Bird" loading="lazy">
                <div class="info">
                   <div id="bird-name" class="title">{{ birds_data[0].name }}</div>
                   <div id="bird-desc" class="desc">{{ birds_data[0].desc }}</div>
                   <span id="bird-loc" class="loc">{{ birds_data[0].loc }}</span>
                </div>
            {% else %}
                <div class="info">
                    <div class="title">No birds yet!</div>
                    <div class="desc">Please upload your first bird.</div>
                </div>
            {% endif %}
        </div>
    </div>

    <div class="add-btn" onclick="toggleModal(true)">+</div>

    <div class="upload-modal" id="uploadModal">
        <div class="upload-content">
            <span class="close-btn" onclick="toggleModal(false)">&times;</span>
            <h3>New Post</h3>
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="input-label">Upload Photo</label>
                    <label class="custom-file-upload">
                        <input type="file" name="photo" id="photo-upload" required>
                        <span id="file-name-display">Select an image...</span>
                    </label>
                </div>

                <div class="form-group">
                    <label class="input-label">Bird Name</label>
                    <input type="text" name="title" placeholder="e.g. Barn Owl" required>
                </div>

                <div class="form-group">
                    <label class="input-label">Location</label>
                    <input type="text" name="location" placeholder="e.g. Central Park" required>
                </div>

                <div class="form-group">
                    <label class="input-label">Description</label>
                    <input type="text" name="description" placeholder="A short description...">
                </div>

                <button type="submit" class="btn btn-login">Publish</button>
            </form>
        </div>
    </div>
    <script>
        const birds = {{ birds_data | tojson | safe }};
        let currentIndex = 0;
        function nextBird() {
            if (birds.length <= 1) return;
            currentIndex = (currentIndex + 1) % birds.length;
            document.getElementById('bird-img').src = birds[currentIndex].img;
            document.getElementById('bird-name').innerText = birds[currentIndex].name;
            document.getElementById('bird-desc').innerText = birds[currentIndex].desc;
            document.getElementById('bird-loc').innerText = birds[currentIndex].loc;
        }

        function toggleModal(show) {
            const modal = document.getElementById('uploadModal');
            if (show) modal.classList.add('active');
            else modal.classList.remove('active');
        }

        document.getElementById('photo-upload').addEventListener('change', function(e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : 'Select an image...';
            document.getElementById('file-name-display').textContent = fileName;
        });
    </script>
</body>
</html>
