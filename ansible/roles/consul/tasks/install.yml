- name: Install unzip package
  ansible.builtin.apt:
    name: unzip
    state: present
    update_cache: yes
  become: yes

- name: Create user
  ansible.builtin.user:
    name: "{{ consul_user }}"
    group: "{{ consul_group }}"
    system: yes
    shell: /bin/false

- name: Download and unzip Consul
  ansible.builtin.unarchive:
    src: "https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_linux_{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}.zip"
    dest: /usr/local/bin
    remote_src: yes
    mode: '0755'
    owner: root
    group: root

- name: Create the necessary directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"
    mode: '0755'
  loop:
  - "{{ consul_data_dir }}"
  - "{{ consul_config_dir }}"
